name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      tools: ${{ steps.find.outputs.tools }}
    steps:
      - uses: actions/checkout@v4
      - name: Find Go tools
        id: find
        run: |
          TOOLS=$(find . -maxdepth 2 -name go.mod -printf '%h\n' | sed 's|^\./||' | jq -Rc . | jq -sc .)
          echo "tools=${TOOLS}" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: ${{ fromJson(needs.discover.outputs.tools) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.tool }}/go.mod

      - name: Test
        working-directory: ${{ matrix.tool }}
        run: go test -v -race ./...

      - name: Build
        working-directory: ${{ matrix.tool }}
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
        run: go build -trimpath -ldflags="-s -w" -o ../dist/${{ matrix.tool }}-linux-amd64 .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.tool }}-linux-amd64
          path: dist/

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
